<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invoice PDF Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    // Listen for message from background
    chrome.runtime.onMessage.addListener((msg, sender) => {
      if (msg.type === 'GENERATE_PDF') {
        generatePdf(msg.data);
      }
    });

    function generatePdf(invoiceJson) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      // Set font size
      doc.setFontSize(16);
      doc.text('AliExpress Invoice', 105, 20, { align: 'center' });
      doc.setFontSize(12);
      // Basic info
      const orderInfo = invoiceJson.data?.invoiceInfo || {};
      const buyerInfo = invoiceJson.data?.buyerInfo || {};
      const sellerInfo = invoiceJson.data?.sellerInfo || {};
      const logisticsInfo = invoiceJson.data?.logisticsInfo || {};
      const paymentInfo = invoiceJson.data?.paymentInfo || {};
      let y = 30;
      doc.text(`Order Number: ${orderInfo.orderId || 'N/A'}`, 20, y); y += 10;
      doc.text(`Order Date: ${orderInfo.orderTime ? new Date(orderInfo.orderTime*1000).toLocaleDateString() : 'N/A'}`, 20, y); y += 10;
      doc.text(`Buyer: ${buyerInfo.buyerName || 'N/A'}`, 20, y); y += 10;
      doc.text(`Buyer Email: ${buyerInfo.buyerEmail || 'N/A'}`, 20, y); y += 10;
      doc.text(`Seller: ${sellerInfo.sellerName || 'N/A'}`, 20, y); y += 10;
      doc.text(`Seller ID: ${sellerInfo.sellerId || 'N/A'}`, 20, y); y += 10;
      // Items table
      y += 10;
      doc.text('Items:', 20, y); y += 10;
      const items = orderInfo.invoiceItemList || [];
      if (items.length === 0) {
        doc.text('No items found', 20, y); y += 10;
      } else {
        items.forEach((item, idx) => {
          doc.text(`${idx+1}. ${item.productName || 'Unknown Product'}`, 25, y); y += 7;
          doc.text(`   Quantity: ${item.productQuantity || 0} × Price: ${item.productPrice || 0}`, 25, y); y += 7;
          doc.text(`   Total: ${item.productTotalPrice || 0}`, 25, y); y += 10;
        });
      }
      // Totals
      y += 5;
      doc.text(`Total Amount: ${orderInfo.totalAmount || 0} ${orderInfo.currency || ''}`, 20, y); y += 10;
      doc.text(`Payment Method: ${paymentInfo.paymentMethod || 'N/A'}`, 20, y); y += 10;
      // Generate blob and send back
      const pdfBlob = doc.output('blob');
      // Send message to extension to deliver blob
      chrome.runtime.sendMessage({ type: 'PDF_READY', blob: pdfBlob });
      // Close offscreen document after sending
      chrome.offscreen.closeDocument();
    }
  </script>
</head>
<body>
  <h1>Generating PDF...</h1>
</body>
</html>
