<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="brand">TRDEFI</div>
  <button id="btn-expand" class="btn-expand" title="Open in full tab view">⛶</button>

  <!-- Step 0: License -->
  <div id="step-license" style="display:none">
    <h2>Activate Your License</h2>
    <div class="plan-cards">
      <div class="plan-card free-trial">
        <div class="plan-badge">FREE</div>
        <div class="plan-name">FREE TRIAL</div>
        <div class="plan-price">$0</div>
        <div class="plan-feature">10 invoices free</div>
        <button class="btn plan-btn" id="btn-subscribe-free-trial">Start Free</button>
      </div>
      <div class="plan-card monthly">
        <div class="plan-name">MONTHLY</div>
        <div class="plan-price">$10<span>/mo</span></div>
        <div class="plan-feature">Unlimited invoices</div>
        <button class="btn plan-btn" id="btn-subscribe-monthly">Subscribe</button>
      </div>
    </div>
    <div class="card">
      <label>License Key</label>
      <input type="text" id="license-key" placeholder="Paste your license key here">
      <button id="btn-activate" class="btn primary">ACTIVATE</button>
    </div>
    <div id="license-error" class="license-msg error" style="display:none"></div>
  </div>

  <!-- Step 1: Input -->
  <div id="step-input" style="display:none">
    <div id="license-bar" class="license-bar">
      <span id="license-type" class="type"></span>
      <span id="license-limit" class="limit"></span>
    </div>
    <h2>AliExpress Receipt Downloader</h2>
    <div class="card">
      <label>Date Range</label>
      <div class="date-row">
        <input type="date" id="from-date">
        <span class="sep">→</span>
        <input type="date" id="to-date">
      </div>
      <button id="btn-analyze" class="btn primary">ANALYZE</button>
    </div>
  </div>

  <!-- Step 2: Review -->
  <div id="step-review" style="display:none">
    <h2>Orders Found</h2>
    <div id="review-summary" class="card"></div>
    <div id="review-list" class="card"></div>
    <div class="btn-row">
      <button id="btn-cancel" class="btn secondary">CANCEL</button>
      <button id="btn-download" class="btn primary">DOWNLOAD ALL</button>
    </div>
  </div>

  <!-- Step 3: Progress -->
  <div id="step-progress" style="display:none">
    <h2 id="progress-title">Downloading...</h2>
    <div class="card">
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <div id="progress-info" class="progress-info"></div>
    </div>
    <div class="card counter">
      <span>OK: <strong id="count-ok">0</strong></span>
      <span>FAIL: <strong id="count-fail">0</strong></span>
    </div>
    <div id="log" class="card log"></div>
    <button id="btn-stop" class="btn stop">STOP</button>
  </div>

  <!-- Step 4: Complete -->
  <div id="step-complete" style="display:none">
    <h2>Download Complete</h2>
    <div id="complete-summary" class="card"></div>
    <div id="complete-list" class="card complete-list"></div>
    <button id="btn-new" class="btn primary">NEW DOWNLOAD</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
